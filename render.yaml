services:
  # Backend API
  - type: web
    name: conciencia-backend
    env: node
    plan: free
    buildCommand: cd back && npm install && npm run build
    startCommand: cd back && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false  # Debes configurarlo en el dashboard de Render
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Debes configurarlo en el dashboard de Render
      - key: JWT_SECRET
        generateValue: true  # Render generará un valor aleatorio
      - key: GOOGLE_GEMINI_API_KEY
        sync: false  # Opcional - configúralo si tienes la API key
      - key: HUGGING_FACE_API_KEY
        sync: false  # Opcional
      - key: CORS_ORIGIN
        value: https://conciencia-frontend.onrender.com  # Cambia esto por tu URL de frontend

  # Frontend
  - type: static
    name: conciencia-frontend
    plan: free
    buildCommand: cd front && npm install && npm run build
    staticPublishPath: ./front/dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

